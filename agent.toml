name        = "ag"
description = "Actix + Dioxus RAG platform with full observability stack"

[metadata]
default_branch = "main"
workspace_root = "/home/pde/ag"
frontend_path  = "frontend/fro"
backend_path   = "backend"

[commands.init]
command = "qodo --init"
execution = "shell"

[commands.status]
command = "qodo --status"
execution = "shell"

[commands.backend]
command = "cd backend && RUST_LOG=info cargo run"
execution = "shell"
working_dir = "backend"

[commands.frontend]
command = "npm run css:watch"
execution = "shell"
working_dir = "frontend/fro"

[commands.stack]
command = "docker compose up -d"
execution = "shell"
working_dir = "."

[env]
RUST_LOG = "info"
