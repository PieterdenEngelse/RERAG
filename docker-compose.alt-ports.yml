# ag Infrastructure Stack - ALTERNATE PORTS
#
# Use this if you have existing services on default ports (Grafana, Prometheus, etc.)
#
# Usage:
#   docker compose -f docker-compose.alt-ports.yml up -d
#
# Port mapping (default → alternate):
#   Grafana:    3001 → 13001
#   Prometheus: 9090 → 19090
#   Redis:      6379 → 16379
#   Loki:       3100 → 13100
#   Tempo:      3200 → 13200, 4317 → 14317
#   OTel:       4318 → 14318
#   Neo4j:      7474, 7687 (unchanged - rarely conflicts)

services:
  neo4j:
    image: neo4j:5
    container_name: ag-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/agpassword123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: ag-redis
    restart: unless-stopped
    ports:
      - "16379:6379"  # Alternate port
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: ag-prometheus
    restart: unless-stopped
    ports:
      - "19090:9090"  # Alternate port
    volumes:
      - ./ops/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ag-grafana
    restart: unless-stopped
    ports:
      - "13001:3000"  # Alternate port
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:2.9.4
    container_name: ag-loki
    restart: unless-stopped
    ports:
      - "13100:3100"  # Alternate port
    volumes:
      - ./ops/observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml

  tempo:
    image: grafana/tempo:2.3.1
    container_name: ag-tempo
    restart: unless-stopped
    ports:
      - "13200:3200"  # Alternate port
      - "14317:4317"  # Alternate port
    volumes:
      - ./ops/observability/tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo-data:/tmp/tempo
    command: -config.file=/etc/tempo/config.yml

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: ag-otel
    restart: unless-stopped
    ports:
      - "14318:4318"  # Alternate port
      - "18888:8888"  # Alternate port
    volumes:
      - ./ops/observability/otel-collector.yml:/etc/otelcol/config.yaml:ro
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      - tempo
      - loki

volumes:
  neo4j-data:
  neo4j-logs:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
