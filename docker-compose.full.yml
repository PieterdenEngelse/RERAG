version: '3.8'

# Full infrastructure stack for ag - Agentic RAG Platform
# 
# Usage:
#   docker compose -f docker-compose.full.yml up -d
#
# Services:
#   - Neo4j      :7474 (browser), :7687 (bolt) - Knowledge Graph
#   - Redis      :6379                          - L3 Cache
#   - Prometheus :9090                          - Metrics
#   - Grafana    :3001                          - Dashboards
#   - Loki       :3100                          - Log aggregation
#   - Tempo      :3200, :4317                   - Distributed tracing
#   - OTel       :4318                          - Telemetry collector

services:
  # ═══════════════════════════════════════════════════════════════
  # NEO4J - Knowledge Graph for GraphRAG
  # ═══════════════════════════════════════════════════════════════
  neo4j:
    image: neo4j:5
    container_name: ag-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/agpassword123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # REDIS - L3 Cache
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: ag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # PROMETHEUS - Metrics Collection
  # ═══════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: ag-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./ops/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ═══════════════════════════════════════════════════════════════
  # GRAFANA - Dashboards & Visualization
  # ═══════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:10.4.2
    container_name: ag-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  # ═══════════════════════════════════════════════════════════════
  # LOKI - Log Aggregation
  # ═══════════════════════════════════════════════════════════════
  loki:
    image: grafana/loki:2.9.4
    container_name: ag-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # ═══════════════════════════════════════════════════════════════
  # TEMPO - Distributed Tracing
  # ═══════════════════════════════════════════════════════════════
  tempo:
    image: grafana/tempo:2.3.1
    container_name: ag-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"   # Tempo API
      - "4317:4317"   # OTLP gRPC
    volumes:
      - tempo-data:/tmp/tempo
      - ./ops/observability/tempo/config.yml:/etc/tempo/tempo.yaml:ro
    command: -config.file=/etc/tempo/tempo.yaml

  # ═══════════════════════════════════════════════════════════════
  # OTEL COLLECTOR - Telemetry Pipeline
  # ═══════════════════════════════════════════════════════════════
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: ag-otel
    restart: unless-stopped
    ports:
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Metrics
    volumes:
      - ./ops/observability/otel-collector.yml:/etc/otelcol/config.yaml:ro
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      - tempo
      - loki

volumes:
  neo4j-data:
  neo4j-logs:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
