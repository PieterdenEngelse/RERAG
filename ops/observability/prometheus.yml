global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ag-backend-search'
    metrics_path: /monitoring/metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:3010']
        labels:
          service: ag
          server: search
          env: dev

  - job_name: 'ag-backend-upload'
    metrics_path: /monitoring/metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:3011']
        labels:
          service: ag
          server: upload
          env: dev

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'vector'
    static_configs:
      - targets: ['host.docker.internal:8686']
        labels:
          service: vector

  - job_name: 'loki'
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['ag-loki:3100']
        labels:
          service: loki

  - job_name: 'otelcol'
    scrape_interval: 10s
    static_configs:
      - targets: ['ag-otel:8888']
        labels:
          service: otelcol

  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          service: node
