# ============================
# GLOBAL DEV PROFILE
# ============================
[profile.dev]
opt-level = 0
debug = true
lto = false
codegen-units = 256
incremental = true

# ============================
# GLOBAL RELEASE PROFILE (native default)
# ============================
[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
incremental = false
strip = "symbols"
panic = "abort"

# ============================
# NATIVE BACKEND OVERRIDES
# ============================
[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=native",
    "-C", "link-arg=-fuse-ld=mold",
    "-C", "inline-threshold=1000",
]

# ============================
# WASM FRONTEND OVERRIDES
# ============================
[target.wasm32-unknown-unknown]
rustflags = [
    "-C", "opt-level=z",
    "-C", "link-arg=--export-table",
    "-C", "link-arg=--export=__heap_base",
    "-C", "link-arg=--export=__data_end",
]

# WASM-specific release overrides
[profile.release.package."*"]
opt-level = "z"
codegen-units = 1
strip = "none"

