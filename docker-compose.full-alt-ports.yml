version: '3.8'

# Full infrastructure stack for ag - WITH ALTERNATE PORTS
# Use this if you have native services running on default ports
#
# Usage:
#   docker compose -f docker-compose.full-alt-ports.yml up -d
#
# Port mapping (Native → Docker):
#   Redis:      6379 → 16379
#   Prometheus: 9090 → 19090
#   Grafana:    3001 → 13001
#   Loki:       3100 → 13100
#   Tempo:      3200 → 13200, 4317 → 14317
#   OTel:       4318 → 14318, 8888 → 18888
#   Neo4j:      7474, 7687 (no conflict)

services:
  # ═══════════════════════════════════════════════════════════════
  # NEO4J - Knowledge Graph for GraphRAG
  # ═══════════════════════════════════════════════════════════════
  neo4j:
    image: neo4j:5
    container_name: ag-neo4j-alt
    restart: unless-stopped
    ports:
      - "7474:7474"   # No conflict
      - "7687:7687"   # No conflict
    environment:
      - NEO4J_AUTH=neo4j/agpassword123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=512m
    volumes:
      - neo4j-data-alt:/data
      - neo4j-logs-alt:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # REDIS - L3 Cache (port 16379)
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: ag-redis-alt
    restart: unless-stopped
    ports:
      - "16379:6379"  # Alternate port
    volumes:
      - redis-data-alt:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # PROMETHEUS - Metrics Collection (port 19090)
  # ═══════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: ag-prometheus-alt
    restart: unless-stopped
    ports:
      - "19090:9090"  # Alternate port
    volumes:
      - ./ops/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data-alt:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ═══════════════════════════════════════════════════════════════
  # GRAFANA - Dashboards & Visualization (port 13001)
  # ═══════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:10.4.2
    container_name: ag-grafana-alt
    restart: unless-stopped
    ports:
      - "13001:3000"  # Alternate port
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data-alt:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  # ═══════════════════════════════════════════════════════════════
  # LOKI - Log Aggregation (port 13100)
  # ═══════════════════════════════════════════════════════════════
  loki:
    image: grafana/loki:2.9.4
    container_name: ag-loki-alt
    restart: unless-stopped
    ports:
      - "13100:3100"  # Alternate port
    volumes:
      - loki-data-alt:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # ═══════════════════════════════════════════════════════════════
  # TEMPO - Distributed Tracing (ports 13200, 14317)
  # ═══════════════════════════════════════════════════════════════
  tempo:
    image: grafana/tempo:2.3.1
    container_name: ag-tempo-alt
    restart: unless-stopped
    ports:
      - "13200:3200"  # Alternate port
      - "14317:4317"  # Alternate port
    volumes:
      - tempo-data-alt:/tmp/tempo
    command: -config.file=/etc/tempo/tempo.yaml

  # ═══════════════════════════════════════════════════════════════
  # OTEL COLLECTOR - Telemetry Pipeline (ports 14318, 18888)
  # ═══════════════════════════════════════════════════════════════
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: ag-otel-alt
    restart: unless-stopped
    ports:
      - "14318:4318"  # Alternate port
      - "18888:8888"  # Alternate port
    volumes:
      - ./ops/observability/otel-collector.yml:/etc/otelcol/config.yaml:ro
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      - tempo
      - loki

volumes:
  neo4j-data-alt:
  neo4j-logs-alt:
  redis-data-alt:
  prometheus-data-alt:
  grafana-data-alt:
  loki-data-alt:
  tempo-data-alt:
