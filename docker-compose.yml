# ag Infrastructure Stack
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d redis        # Start just the L3 cache
#   docker compose down               # Stop all services
#
# Services:
#   Core (required for full functionality):
#     - redis     :6379  - L3 Cache
#
#   FalkorDB (knowledge graph) is NOT a container — it runs as a native systemd
#   user service. See docs/falkordb-native-service.md.
#
#   Extractors (optional):
#     - docling   :5001  - Structural PDF/DOCX/PPTX extraction (set DOCLING_ENABLED=true)
#
#   Observability (optional):
#     - prometheus :9090  - Metrics collection
#     - grafana    :3001  - Dashboards (3001 because Qodo uses 3000)
#     - loki       :3100  - Log aggregation
#     - tempo      :3200  - Distributed tracing
#     - otel       :4318  - Telemetry collector
#
# Profiles:
#   docker compose up -d                        # All services
#   docker compose --profile core up -d         # Just Redis + Ollama
#   docker compose --profile observability up -d # Just observability stack
#   docker compose --profile docling up -d      # Docling extractor sidecar
#
# Host-port overrides (when the default ports clash with something on the host):
#   Put any of these in the project's `.env` file next to this compose file
#   (Docker Compose reads it automatically). Container-internal ports never change.
#
#     REDIS_HOST_PORT=16379
#     PROMETHEUS_HOST_PORT=19090
#     GRAFANA_HOST_PORT=13001
#     LOKI_HOST_PORT=13100
#     TEMPO_HOST_PORT=13200
#     TEMPO_OTLP_HOST_PORT=14317
#     OTEL_HTTP_HOST_PORT=14318
#     OTEL_METRICS_HOST_PORT=18888

services:
  # ═══════════════════════════════════════════════════════════════
  # CORE SERVICES (Required for full ag functionality)
  # ═══════════════════════════════════════════════════════════════

  # FalkorDB (knowledge-graph store)
  #
  # Linux: NOT brought up by default — runs as a native systemd user
  # service (see docs/falkordb-native-service.md). The Linux installer's
  # `falkordb` step renders falkordb.service and skips this container.
  #
  # Windows: brought up by the Windows installer via
  # `docker compose --profile falkor-container up -d`. No native FalkorDB
  # build exists for Windows, so the container is the only viable path
  # there. The Linux default `docker compose up` never activates this
  # service because `falkor-container` is the ONLY profile listed
  # (empty-string default profile is intentionally absent).
  falkordb:
    image: falkordb/falkordb:latest
    container_name: ag-falkordb
    restart: unless-stopped
    profiles: ["falkor-container"]
    ports:
      - "${FALKORDB_HOST_PORT:-6380}:6379"
    volumes:
      - falkordb-data:/data
    environment:
      - FALKORDB_PASSWORD=${FALKOR_PASSWORD:-agpassword123}
    healthcheck:
      test:
        - "CMD"
        - "redis-cli"
        - "-a"
        - "${FALKOR_PASSWORD:-agpassword123}"
        - "ping"
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ag-redis
    restart: unless-stopped
    profiles: ["", "core"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # OBSERVABILITY SERVICES (Optional - for monitoring/debugging)
  # ═══════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: ag-prometheus
    restart: unless-stopped
    profiles: ["", "observability"]
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./ops/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ag-grafana
    restart: unless-stopped
    profiles: ["", "observability"]
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3002"  # 3001 external (Qodo uses 3000)
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3002
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/observability/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./backend/src/monitoring/dashboards/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./backend/src/monitoring/dashboards/ag.yaml:/etc/grafana/provisioning/dashboards/ag.yaml:ro
      - ./backend/src/monitoring/dashboards/ag:/etc/grafana/dashboards/ag:ro
      - ./backend/src/monitoring/dashboards/extras.yaml:/etc/grafana/provisioning/dashboards/extras.yaml:ro
      - ./backend/src/monitoring/dashboards/extras:/etc/grafana/dashboards/extras:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:2.9.4
    container_name: ag-loki
    restart: unless-stopped
    profiles: ["", "observability"]
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    volumes:
      - ./ops/observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  tempo:
    image: grafana/tempo:2.3.1
    container_name: ag-tempo
    restart: unless-stopped
    profiles: ["", "observability"]
    ports:
      - "${TEMPO_HOST_PORT:-3200}:3200"  # Tempo API
      - "${TEMPO_OTLP_HOST_PORT:-4317}:4317"  # OTLP gRPC
    volumes:
      - ./ops/observability/tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo-data:/tmp/tempo
    command: -config.file=/etc/tempo/config.yml
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: ag-otel
    restart: unless-stopped
    profiles: ["", "observability"]
    ports:
      - "${OTEL_HTTP_HOST_PORT:-4318}:4318"  # OTLP HTTP
      - "${OTEL_METRICS_HOST_PORT:-8888}:8888"  # Metrics
      - "13133:13133"  # Health check
    volumes:
      - ./ops/observability/otel-collector.yml:/etc/otelcol/config.yaml:ro
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      - tempo
      - loki
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════
  # LLM SERVICE (Ollama for embeddings and chat)
  # ═══════════════════════════════════════════════════════════════

  ollama:
    image: ollama/ollama:latest
    container_name: ag-ollama
    restart: unless-stopped
    profiles: ["", "core"]
    ports:
      - "11434:11434"  # Ollama API
    volumes:
      - ollama-data:/root/.ollama  # Persist downloaded models
    environment:
      - OLLAMA_HOST=0.0.0.0  # Listen on all interfaces
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      # The ollama/ollama image ships no curl/wget, so probe via the bundled
      # ollama CLI instead — `ollama list` returns 0 once the server answers.
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════
  # DOCLING EXTRACTOR (Structural PDF/DOCX/PPTX extraction)
  # ═══════════════════════════════════════════════════════════════
  #
  # Enable with:
  #   docker compose --profile docling up -d
  # Then set DOCLING_ENABLED=true DOCLING_URL=http://localhost:5001 in .env

  docling:
    build:
      context: ./docling_sidecar
    container_name: ag-docling
    restart: unless-stopped
    profiles: ["docling"]
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  redis-data:
  falkordb-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
  ollama-data:
