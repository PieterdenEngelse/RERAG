name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). For workflow_dispatch only."
        required: true
        default: "v0.1.0-dev"

# Phase 0 lock-ins implemented here:
#   - runs-on: ubuntu-24.04 (glibc 2.39 baseline; revised from 22.04 on
#     first CI run — ag's onnx feature pulls ort crate's prebuilt ONNX
#     binaries which require glibc 2.39)
#   - gh release create --prerelease for any v0.x.y tag (stripped for v1.0.0+)
#   - FalkorDB image SHA pinned via installer/falkordb.pin
#
# See docs/bin3 §Detailed execution plan §Phase A for the spec.

permissions:
  contents: write  # gh release create needs this

env:
  # Override .cargo/config.toml's target-cpu=native to a portable baseline.
  # x86-64-v3 = Haswell (2013) and later — covers AVX2, BMI2, FMA, LZCNT,
  # MOVBE, POPCNT, XSAVE. Excludes pre-Haswell CPUs.
  # Without this, CI builds for the runner's CPU (which may have AVX-512)
  # and the binary SIGILLs on user CPUs without that instruction set.
  # See docs/bin3 §Decision surface for the portability rationale.
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C target-cpu=x86-64-v3 -C link-arg=-fuse-ld=mold"

jobs:
  appimage:
    name: Build AppImage (linux-x86_64)
    runs-on: ubuntu-24.04
    # v0.2.5's first attempt timed out at 45 min during "Build ag-installer"
    # — Cargo.lock changed via the PR #9 merge so the cache was invalidated
    # and every dep recompiled cold. 90 min gives breathing room for cold
    # builds; warm cache runs finish in ~10 min.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # build.rs needs the git history for SHA stamping
          lfs: true       # repo's .gitattributes stores *.json in LFS;
                          # without this, package-lock.json is the 130-byte
                          # LFS pointer and npm ci fails with "no lockfile"

      - name: Determine version tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Strip leading v for the version string.
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Pre-release if MAJOR is 0.
          if [[ "$VERSION" =~ ^0\. ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Building $TAG (version=$VERSION, prerelease=${{ steps.tag.outputs.prerelease }})"

      - name: Verify installer/Cargo.toml version matches tag
        # Catches the drift that v0.2.0 → v0.2.4 had: AppImage filename came
        # from the git tag, but the binary's embedded CARGO_PKG_VERSION stayed
        # at 0.1.0 because installer/Cargo.toml was never bumped. Fail fast
        # here so the release process can't ship a binary that lies about its
        # version.
        env:
          EXPECTED: ${{ steps.tag.outputs.version }}
        run: |
          CARGO_VERSION="$(grep -E '^version[[:space:]]*=' installer/Cargo.toml \
            | head -1 | cut -d'"' -f2)"
          if [[ -z "$CARGO_VERSION" ]]; then
            echo "::error::could not parse version from installer/Cargo.toml" >&2
            exit 1
          fi
          if [[ "$CARGO_VERSION" != "$EXPECTED" ]]; then
            echo "::error::installer/Cargo.toml version ($CARGO_VERSION) does not match tag ($EXPECTED)." >&2
            echo "::error::Bump installer/Cargo.toml to $EXPECTED in the same commit you tag." >&2
            exit 1
          fi
          echo "installer/Cargo.toml version=$CARGO_VERSION matches tag — OK"

      - name: Install build-time system deps
        # Dioxus desktop (0.7.x) uses webkit2gtk under the hood. Ubuntu
        # runners don't ship the -dev packages by default.
        # mold: backend/.cargo/config.toml passes -C link-arg=-fuse-ld=mold
        # to rustc; without mold installed, the linker step fails with
        # "cannot find 'ld'" because gcc has no fallback path.
        # libfuse2 is for appimagetool's runtime — without it, appimagetool
        # fails to mount the AppDir for sandbox introspection.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libfuse2 \
            mold \
            build-essential

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # wasm32-unknown-unknown is required for the frontend (Dioxus web →
          # trunk build --release). Without it, the frontend build errors
          # with E0463 "can't find crate for std".
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + target/
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/fro/package-lock.json

      - name: Install cargo-binstall
        # cargo-binstall downloads prebuilt binaries instead of compiling
        # from source. Used to install dx in the next step in ~30s instead
        # of the ~10-15 min a `cargo install dioxus-cli` would take.
        uses: cargo-bins/cargo-binstall@main

      - name: Install dioxus-cli
        # dx handles Dioxus 0.7's asset!() macro — bundles output.css and
        # other declared assets into the build dir with hashed filenames so
        # the runtime <link> injection in app.rs resolves. trunk does not
        # process asset!() and produces a CSS-less dist, which shipped
        # broken-layout AppImages from v0.2.0 → v0.2.4.
        # Version pinned to match local dev (CLAUDE.md's `dx serve`
        # invocation).
        run: cargo binstall dioxus-cli@0.7.9 --no-confirm --locked

      - name: Install appimagetool
        run: |
          wget -qO /tmp/appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool
          appimagetool --version || true

      - name: Build ag (backend)
        run: cargo build --release -p ag --features layout_ml

      - name: Build ag-installer
        run: cargo build --release -p ag-installer

      - name: Smoke-test ag-installer --version
        run: ./target/release/ag-installer --version

      - name: Build frontend dist
        # css:build runs Tailwind first to generate assets/styling/output.css.
        # dx build then bundles output.css + favicon + images via asset!()
        # into target/dx/fro/release/web/public/ with hashed filenames.
        run: |
          cd frontend/fro
          npm ci
          npm run css:build
          dx build --package fro --platform web --release

      - name: Extract FalkorDB binaries from pinned image
        run: |
          PIN="$(grep -v '^#' installer/falkordb.pin | head -1 | tr -d '[:space:]')"
          echo "FalkorDB pin: $PIN"
          docker pull "$PIN"
          STAGE="installer/stage/falkordb"
          mkdir -p "$STAGE"
          docker rm -f ag-fdb-extract >/dev/null 2>&1 || true
          docker create --name ag-fdb-extract "$PIN" >/dev/null
          docker cp ag-fdb-extract:/usr/local/bin/redis-server          "$STAGE/" 2>/dev/null
          docker cp ag-fdb-extract:/usr/local/bin/redis-cli             "$STAGE/" 2>/dev/null
          docker cp ag-fdb-extract:/var/lib/falkordb/bin/falkordb.so    "$STAGE/" 2>/dev/null
          docker rm ag-fdb-extract >/dev/null
          chmod +x "$STAGE/redis-server" "$STAGE/redis-cli"
          ls -lh "$STAGE"

      - name: Assemble + build AppImage
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          FALKORDB_STAGE: installer/stage/falkordb
        run: bash installer/build-appimage.sh

      - name: Upload AppImage as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ag-installer-${{ steps.tag.outputs.tag }}-x86_64
          path: |
            ag-installer-v${{ steps.tag.outputs.version }}-x86_64.AppImage
            ag-installer-v${{ steps.tag.outputs.version }}-x86_64.AppImage.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          PRERELEASE: ${{ steps.tag.outputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE_FLAG \
            "ag-installer-v${{ steps.tag.outputs.version }}-x86_64.AppImage" \
            "ag-installer-v${{ steps.tag.outputs.version }}-x86_64.AppImage.sha256"

  windows-msi:
    name: Build MSI (windows-x86_64)
    runs-on: windows-latest
    # Cold builds on windows-latest are slower than Ubuntu — Rust deps
    # + frontend + WiX install fits in ~45 min cold, ~12 min warm.
    timeout-minutes: 90
    # Serialize after the appimage job so the GitHub Release exists when
    # we go to upload the MSI. Avoids a race where both jobs try to
    # `gh release create` the same tag.
    needs: appimage
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # build.rs needs git history for SHA stamping
          lfs: true       # package-lock.json is stored in LFS

      - name: Determine version tag
        id: tag
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Rust (x86_64-pc-windows-msvc + wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc, wasm32-unknown-unknown

      - name: Cache cargo registry + target/
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-msvc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msvc-

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/fro/package-lock.json

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install dioxus-cli + cargo-wix
        # Both pinned to keep the build reproducible. dx 0.7.9 matches the
        # CLAUDE.md `dx serve` invocation and the Linux release job.
        # cargo-wix 0.3 generates WiX v3 syntax — matches main.wxs's
        # `http://schemas.microsoft.com/wix/2006/wi` namespace.
        run: |
          cargo binstall dioxus-cli@0.7.9 --no-confirm --locked
          cargo binstall cargo-wix --no-confirm --locked

      - name: Install WiX Toolset 3.11
        # cargo-wix shells out to candle.exe + light.exe + heat.exe from
        # the WiX 3 toolset. windows-latest ships WiX pre-installed
        # most months, but pinning via choco makes the build deterministic.
        shell: pwsh
        run: |
          choco install wixtoolset --version=3.11.2 -y --no-progress
          # Add the WiX bin/ to PATH for subsequent steps.
          "C:\Program Files (x86)\WiX Toolset v3.11\bin" `
            | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build frontend dist
        shell: pwsh
        run: |
          cd frontend\fro
          npm ci
          npm run css:build
          dx build --package fro --platform web --release

      - name: Build ag (backend)
        run: cargo build --release -p ag --target x86_64-pc-windows-msvc

      - name: Build ag-installer
        run: cargo build --release -p ag-installer --target x86_64-pc-windows-msvc

      - name: Smoke-test ag-installer --version
        run: target\x86_64-pc-windows-msvc\release\ag-installer.exe --version

      - name: Harvest web/ assets with heat.exe
        # Produces installer\wix\web.wxs with a ComponentGroup named
        # WebFilesGroup containing every file under the dx-built
        # dashboard dist. main.wxs's <Feature Id='Main'> references
        # WebFilesGroup via <ComponentGroupRef>. -gg auto-generates
        # GUIDs, -srd suppresses root-dir component, -sfrag emits one
        # fragment, -var picks the preprocessor var so the source path
        # is configurable at candle time.
        shell: pwsh
        run: |
          $webDir = "target\dx\fro\release\web\public"
          if (!(Test-Path $webDir)) {
            Write-Error "dx build output not at $webDir — frontend build step did not produce assets"
            exit 1
          }
          heat dir $webDir `
            -dr ShareAgDir `
            -cg WebFilesGroup `
            -gg -srd -sfrag `
            -var var.WebDir `
            -out installer\wix\web.wxs

      - name: Build MSI via cargo-wix
        shell: pwsh
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # cargo-wix builds candle args from the WebDir preprocessor
          # variable referenced by heat-emitted web.wxs (-var var.WebDir
          # above). Forward via the `--` separator.
          cargo wix `
            -p ag-installer `
            --no-build `
            --target x86_64-pc-windows-msvc `
            --include installer\wix\web.wxs `
            --nocapture `
            --output "ag-installer-v${env:VERSION}-x86_64.msi" `
            -- -dWebDir=target\dx\fro\release\web\public

      - name: Verify MSI installs + uninstalls cleanly
        # Per-machine MSI requires admin — windows-latest already runs
        # as administrator, so /quiet + /norestart goes straight through.
        # Then exec both binaries' --version to prove they were laid down
        # correctly and the layout matches main.wxs. /x removes them.
        shell: pwsh
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          $msi = "ag-installer-v${env:VERSION}-x86_64.msi"
          Write-Host "Installing $msi …"
          $p = Start-Process msiexec -Wait -PassThru -ArgumentList @(
            "/i", $msi, "/quiet", "/qn", "/norestart"
          )
          if ($p.ExitCode -ne 0) {
            Write-Error "msiexec /i exited $($p.ExitCode)"
            exit 1
          }
          $installerExe = "$env:ProgramFiles\ag\bin\ag-installer.exe"
          $agExe = "$env:ProgramFiles\ag\bin\ag.exe"
          Write-Host "Exec smoke tests …"
          & $installerExe --version
          & $agExe --version
          Write-Host "Uninstalling …"
          $p = Start-Process msiexec -Wait -PassThru -ArgumentList @(
            "/x", $msi, "/quiet", "/qn"
          )
          if ($p.ExitCode -ne 0) {
            Write-Error "msiexec /x exited $($p.ExitCode)"
            exit 1
          }

      - name: SHA256
        shell: pwsh
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          $msi = "ag-installer-v${env:VERSION}-x86_64.msi"
          $hash = (Get-FileHash $msi -Algorithm SHA256).Hash.ToLower()
          "$hash  $msi" | Out-File -FilePath "$msi.sha256" -Encoding ASCII

      - name: Upload MSI as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ag-installer-${{ steps.tag.outputs.tag }}-x86_64-msi
          path: |
            ag-installer-v${{ steps.tag.outputs.version }}-x86_64.msi
            ag-installer-v${{ steps.tag.outputs.version }}-x86_64.msi.sha256

      - name: Upload MSI to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        shell: pwsh
        run: |
          # The appimage job (needs:) already ran `gh release create`,
          # so the release exists. --clobber lets re-runs of windows-msi
          # overwrite a stale upload from a previous failed attempt.
          gh release upload $env:TAG `
            "ag-installer-v$env:VERSION-x86_64.msi" `
            "ag-installer-v$env:VERSION-x86_64.msi.sha256" `
            --clobber
