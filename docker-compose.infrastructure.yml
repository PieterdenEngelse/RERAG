version: '3.8'

# Neo4j for ag backend - GraphRAG support
# Usage: docker compose -f docker-compose.infrastructure.yml up -d
#
# NOTE: Prometheus (9090), Grafana (3001), Loki (3100) are running NATIVELY
#       This file only runs Neo4j in Docker

services:
  # ═══════════════════════════════════════════════════════════════
  # NEO4J - Knowledge Graph for GraphRAG
  # ═══════════════════════════════════════════════════════════════
  neo4j:
    image: neo4j:5
    container_name: ag-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP browser UI
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/agpassword123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j-data:
  neo4j-logs:
